<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriBridge Admin Dashboard</title>
  <style>
    :root {
      --green: #00c853;
      --bg:    #0a1a10;
      --bg2:   #0f2318;
      --bg3:   #152b1c;
      --text:  #e8f5e9;
      --text2: #8aab93;
      --red:   #f44336;
      --gold:  #ffd600;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login Screen ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-box {
      background: var(--bg2); border: 1px solid #1e3a28;
      border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px;
    }
    .login-logo { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
    .login-title { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--green); margin-bottom: 4px; }
    .login-sub { text-align: center; font-size: 0.85rem; color: var(--text2); margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
    .form-group input {
      width: 100%; padding: 12px 14px; background: var(--bg3);
      border: 1px solid #1e3a28; border-radius: 8px; color: var(--text);
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--green); }
    .btn-login {
      width: 100%; padding: 14px; background: var(--green); color: #000;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 0.85rem; text-align: center; margin-top: 12px; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .topbar {
      background: var(--bg2); border-bottom: 1px solid #1e3a28;
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-logo { font-size: 1.1rem; font-weight: 800; color: var(--green); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn-sm {
      padding: 8px 16px; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: none; transition: opacity 0.2s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-logout { background: #1e3a28; color: var(--text2); }
    .btn-refresh { background: var(--green); color: #000; }

    .content { padding: 28px; max-width: 1200px; margin: 0 auto; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg2); border: 1px solid #1e3a28; border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--green); }
    .stat-label { font-size: 0.82rem; color: var(--text2); margin-top: 4px; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 9px 20px; border-radius: 8px; background: var(--bg2);
      border: 1px solid #1e3a28; color: var(--text2); cursor: pointer;
      font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
    }
    .tab.active { background: var(--green); color: #000; border-color: var(--green); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--bg3); padding: 10px 14px; text-align: left; font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 10px 14px; border-bottom: 1px solid #1a2e1f; }
    tr:hover td { background: rgba(0,200,83,0.04); }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
    .badge-green { background: rgba(0,200,83,0.15); color: var(--green); }
    .badge-gold  { background: rgba(255,214,0,0.15);  color: var(--gold); }
    .badge-red   { background: rgba(244,67,54,0.15);  color: var(--red); }
    .badge-gray  { background: rgba(138,171,147,0.15); color: var(--text2); }

    .btn-action { padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-confirm  { background: var(--green); color: #000; }
    .btn-transit  { background: var(--gold);  color: #000; }
    .btn-cancel   { background: var(--red);   color: #fff; }
    .btn-action:hover { opacity: 0.8; }

    .empty { text-align: center; padding: 48px; color: var(--text2); font-size: 0.9rem; }
    .loader-row { text-align: center; padding: 40px; color: var(--text2); }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--green); color: #000;
      padding: 12px 20px; border-radius: 10px; font-weight: 600; font-size: 0.88rem;
      opacity: 0; transition: opacity 0.3s; z-index: 9999; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); color: #fff; }
  </style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🌾</div>
    <div class="login-title">AgriBridge Admin</div>
    <div class="login-sub">Secure access — authorised personnel only</div>
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" id="adminPwd" placeholder="Enter admin password"
             onkeydown="if(event.key==='Enter') doAdminLogin()">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doAdminLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- ══ DASHBOARD ══════════════════════════════════════════════════════════ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">🌾 AgriBridge Admin</div>
    <div class="topbar-right">
      <button class="btn-sm btn-refresh" onclick="refreshAll()">↻ Refresh</button>
      <button class="btn-sm btn-logout" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <div class="content">
    <div class="page-title">Dashboard Overview</div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="s-farmers">—</div><div class="stat-label">Farmers</div></div>
      <div class="stat-card"><div class="stat-num" id="s-buyers">—</div><div class="stat-label">Buyers</div></div>
      <div class="stat-card"><div class="stat-num" id="s-listings">—</div><div class="stat-label">Listings</div></div>
      <div class="stat-card"><div class="stat-num" id="s-orders">—</div><div class="stat-label">Orders</div></div>
      <div class="stat-card"><div class="stat-num" id="s-revenue">—</div><div class="stat-label">Revenue (UGX)</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('orders',this)">Orders</button>
      <button class="tab" onclick="showTab('listings',this)">Listings</button>
      <button class="tab" onclick="showTab('farmers',this)">Farmers</button>
    </div>

    <div class="table-wrap" id="tableArea">
      <div class="loader-row">Loading…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API = 'https://agribridge-1-og7a.onrender.com'; // your Render backend URL
let adminToken = '';
let currentTab = 'orders';

// ── Helpers ──────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + adminToken
  };
}

async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      ...opts,
      headers: { ...authHeaders(), ...(opts.headers || {}) }
    });
    if (res.status === 401) { doLogout(); return null; }
    return res.ok ? res.json() : null;
  } catch (e) {
    showToast('Network error: ' + e.message, true);
    return null;
  }
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doAdminLogin() {
  const pwd = document.getElementById('adminPwd').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!pwd) return;

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const res = await fetch(API + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      adminToken = data.token;
      sessionStorage.setItem('ab_admin_token', adminToken);
      showDashboard();
    } else {
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch (e) {
    err.textContent = 'Could not connect to server. Is the backend running?';
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}

function doLogout() {
  adminToken = '';
  sessionStorage.removeItem('ab_admin_token');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPwd').value = '';
}

// ── Dashboard ────────────────────────────────────────────────────────────────
async function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await refreshAll();
}

async function refreshAll() {
  await Promise.all([loadStats(), loadTab(currentTab)]);
}

async function loadStats() {
  const data = await apiFetch('/api/admin/stats');
  if (!data) return;
  document.getElementById('s-farmers').textContent  = (data.farmers || 0).toLocaleString();
  document.getElementById('s-buyers').textContent   = (data.buyers || 0).toLocaleString();
  document.getElementById('s-listings').textContent = (data.listings || 0).toLocaleString();
  document.getElementById('s-orders').textContent   = (data.orders || 0).toLocaleString();
  const rev = (data.revenue_ugx || 0);
  document.getElementById('s-revenue').textContent  = rev >= 1e6
    ? (rev / 1e6).toFixed(1) + 'M'
    : rev.toLocaleString();
}

function showTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadTab(name);
}

async function loadTab(name) {
  const area = document.getElementById('tableArea');
  area.innerHTML = '<div class="loader-row">Loading…</div>';
  if (name === 'orders')   await renderOrders();
  if (name === 'listings') await renderListings();
  if (name === 'farmers')  await renderFarmers();
}

// ── Orders ────────────────────────────────────────────────────────────────────
async function renderOrders() {
  const data = await apiFetch('/api/admin/orders');
  const area = document.getElementById('tableArea');
  if (!data || !data.length) { area.innerHTML = '<div class="empty">No orders yet.</div>'; return; }

  const statusBadge = s => {
    const map = { pending:'badge-gold', confirmed:'badge-green', in_transit:'badge-green',
                  delivered:'badge-green', cancelled:'badge-red' };
    return `<span class="badge ${map[s]||'badge-gray'}">${s||'pending'}</span>`;
  };

  area.innerHTML = `<table>
    <thead><tr>
      <th>ID</th><th>Buyer Phone</th><th>Qty (kg)</th><th>Price/kg</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>
      ${data.map(o => `<tr id="row-${o.id}">
        <td>#${String(o.id||'').slice(-6)}</td>
        <td>${o.buyer_phone||'—'}</td>
        <td>${o.quantity_kg||0}</td>
        <td>UGX ${(o.price_per_kg||0).toLocaleString()}</td>
        <td>UGX ${(o.total_price||0).toLocaleString()}</td>
        <td><span class="badge badge-gray">${o.payment_method||'—'}</span></td>
        <td id="status-${o.id}">${statusBadge(o.status)}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          ${o.status === 'pending'     ? `<button class="btn-action btn-confirm" onclick="updateOrder('${o.id}','confirmed')">Confirm</button>` : ''}
          ${o.status === 'confirmed'   ? `<button class="btn-action btn-transit" onclick="updateOrder('${o.id}','in_transit')">In Transit</button>` : ''}
          ${o.status === 'in_transit'  ? `<button class="btn-action btn-confirm" onclick="updateOrder('${o.id}','delivered')">Delivered</button>` : ''}
          ${!['delivered','cancelled'].includes(o.status) ? `<button class="btn-action btn-cancel" onclick="updateOrder('${o.id}','cancelled')">Cancel</button>` : ''}
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

async function updateOrder(id, status) {
  const res = await apiFetch(`/api/admin/order/${id}/status`, {
    method: 'PATCH',
    body: JSON.stringify({ status })
  });
  if (res) {
    showToast(`Order updated to: ${status}`);
    await renderOrders();
  } else {
    showToast('Update failed', true);
  }
}

// ── Listings ──────────────────────────────────────────────────────────────────
async function renderListings() {
  const data = await apiFetch('/api/admin/listings');
  const area = document.getElementById('tableArea');
  if (!data || !data.length) { area.innerHTML = '<div class="empty">No listings yet.</div>'; return; }
  area.innerHTML = `<table>
    <thead><tr><th>Crop</th><th>Qty (kg)</th><th>Price/kg</th><th>District</th><th>Available</th><th>Verified</th></tr></thead>
    <tbody>
      ${data.map(l => `<tr>
        <td>${l.crop_name||'—'}</td>
        <td>${l.quantity_kg||0}</td>
        <td>UGX ${(l.price_per_kg||0).toLocaleString()}</td>
        <td>${l.district||'—'}</td>
        <td>${l.is_available ? '<span class="badge badge-green">YES</span>' : '<span class="badge badge-red">NO</span>'}</td>
        <td>${l.is_verified  ? '<span class="badge badge-green">YES</span>' : '<span class="badge badge-gray">NO</span>'}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Farmers ───────────────────────────────────────────────────────────────────
async function renderFarmers() {
  const data = await apiFetch('/api/admin/farmers');
  const area = document.getElementById('tableArea');
  if (!data || !data.length) { area.innerHTML = '<div class="empty">No farmers registered yet.</div>'; return; }
  area.innerHTML = `<table>
    <thead><tr><th>Name</th><th>Phone</th><th>District</th><th>Verified</th><th>Joined</th></tr></thead>
    <tbody>
      ${data.map(f => `<tr>
        <td>${f.full_name||'—'}</td>
        <td>${f.phone||'—'}</td>
        <td>${f.district||'—'}</td>
        <td>${f.is_verified ? '<span class="badge badge-green">YES</span>' : '<span class="badge badge-gray">NO</span>'}</td>
        <td>${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Auto-restore session ──────────────────────────────────────────────────────
(async () => {
  const saved = sessionStorage.getItem('ab_admin_token');
  if (saved) {
    adminToken = saved;
    // Verify token is still valid
    const ok = await fetch(API + '/api/admin/verify', { headers: authHeaders() })
      .then(r => r.ok).catch(() => false);
    if (ok) { showDashboard(); } else { sessionStorage.removeItem('ab_admin_token'); }
  }
})();

// Enter key on password field
document.getElementById('adminPwd')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doAdminLogin();
});
</script>
</body>
</html>
